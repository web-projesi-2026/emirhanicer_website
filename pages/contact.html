<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

  <nav class="navbar">
    <div class="container">
      <a href="../index.html" class="nav-brand">MexGames<span>Portfolio</span></a>

      <div class="hamburger" id="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>

      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html">Ana Sayfa</a></li>
        <li><a href="project.html">Projeler</a></li>
        <li><a href="about.html">Hakkımda</a></li>
        <li><a href="contact.html">İletişim</a></li>
      </ul>
    </div>
  </nav>
  <section class="section">
    <div class="container" style="max-width: 600px;">
      <div class="card" style="padding: 40px;">
        <h2>İletişime Geç</h2>
        <p>Bir sonraki projeniz için bir geliştirici mi arıyorsunuz? Gelin konuşalım.</p>

        <form id="contactForm">
          <div class="form-group">
            <label for="name">İsim</label>
            <input type="text" id="name" class="form-control" required>
          </div>

          <div class="form-group">
            <label for="email">E-posta</label>
            <input type="email" id="email" class="form-control" required>
          </div>

          <div class="form-group">
            <label for="message">Mesaj</label>
            <textarea id="message" class="form-control" required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Mesaj Gönder</button>
        </form>

        <div style="margin-top: 30px; text-align: center;">
          <p>Veya beni şurada bulabilirsiniz:</p>
          <div style="display: flex; gap: 15px; justify-content: center;">
            <a href="#" class="btn btn-secondary">GitHub</a>
            <a href="#" class="btn btn-secondary">LinkedIn</a>
            <a href="#" class="btn btn-secondary">Twitter</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="../assets/js/script.js"></script>
</body>

</html>
